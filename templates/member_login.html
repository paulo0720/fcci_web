<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCCI Member Portal Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  :root {
    --bg-base: #f4fbf7; --bg-mist: #e9f7ef;
    --glass: rgba(255,255,255,0.7); --glass-border: rgba(0,150,90,0.18);
    --emerald: #00a85c; --emerald-bright: #00c46a; --emerald-deep: #00562a;
    --text-main: #0c2418; --text-dim: #5c8270;
  }
  * { box-sizing:border-box; }
  body {
    font-family:'Inter', sans-serif; margin:0; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 12% 8%, rgba(0,196,106,0.16) 0%, transparent 40%),
      radial-gradient(circle at 88% 18%, rgba(0,168,92,0.12) 0%, transparent 45%),
      radial-gradient(circle at 50% 95%, rgba(57,255,176,0.10) 0%, transparent 50%),
      linear-gradient(160deg, #ffffff 0%, var(--bg-base) 45%, var(--bg-mist) 100%);
    color:var(--text-main);
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,150,90,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,150,90,0.05) 1px, transparent 1px);
    background-size:48px 48px;
    mask-image:radial-gradient(circle at 50% 20%, rgba(0,0,0,0.5) 0%, transparent 65%);
    pointer-events:none;
  }
  .login-wrap { width:100%; max-width:420px; padding:20px; position:relative; z-index:1; }
  .logo-ring {
    width:84px; height:84px; border-radius:50%; margin:0 auto 16px; position:relative;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle, rgba(0,196,106,0.18), transparent 70%);
  }
  .logo-ring::before {
    content:''; position:absolute; inset:0; border-radius:50%;
    border:1px solid var(--emerald); opacity:0.55;
    animation:pulse-ring 2.8s ease-out infinite;
  }
  @keyframes pulse-ring {
    0% { transform:scale(0.85); opacity:0.7; }
    70% { transform:scale(1.25); opacity:0; }
    100% { transform:scale(1.25); opacity:0; }
  }
  .logo-ring img { width:60px; height:60px; object-fit:contain; border-radius:50%; position:relative; z-index:1; box-shadow:0 2px 12px rgba(0,100,60,0.15); }
  .login-title { text-align:center; margin-bottom:28px; }
  .login-title h2 { font-family:'Space Grotesk', sans-serif; font-size:24px; font-weight:700; color:var(--emerald-deep); }
  .login-title p { font-size:13px; color:var(--text-dim); }
  .login-card {
    background:var(--glass); backdrop-filter:blur(20px); border:1px solid var(--glass-border);
    border-radius:22px; padding:32px 30px; box-shadow:0 8px 30px rgba(0,150,90,0.1);
  }
  label { display:block; font-size:12px; font-weight:600; color:var(--emerald-deep); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:6px; }
  .form-control {
    background:rgba(255,255,255,0.8); border:1px solid var(--glass-border); border-radius:12px;
    padding:12px 16px; font-size:14.5px; color:var(--text-main); width:100%; margin-bottom:18px;
  }
  .form-control:focus { outline:none; border-color:var(--emerald); box-shadow:0 0 0 3px rgba(0,196,106,0.15); }
  .form-control::placeholder { color:#9bb8a8; }
  .btn-login {
    background:linear-gradient(135deg, var(--emerald-deep), var(--emerald)); color:#fff; border:none;
    border-radius:12px; padding:13px 0; width:100%; font-weight:600; font-size:15px;
    box-shadow:0 6px 20px rgba(0,168,92,0.3);
  }
  .btn-login:hover { color:#fff; }
  .error-box {
    background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.3); color:#c0392b;
    border-radius:12px; padding:12px 16px; font-size:13px; margin-bottom:18px;
  }
  .admin-link { text-align:center; margin-top:18px; font-size:12.5px; }
  .admin-link a { color:var(--text-dim); text-decoration:none; }
  .admin-link a:hover { color:var(--emerald-deep); }
</style>

  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#00562a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FCCI">
  <link rel="apple-touch-icon" href="/static/fcci_logo.jpeg">
</head>
<body>

<div class="login-wrap">
  <div class="logo-ring"><img src="{{ url_for('static', filename='fcci_logo.jpeg') }}" alt="FCCI"></div>

  <div class="login-title">
    <h2>FCCI Member Portal</h2>
    <p>Filipino Community Center International</p>
  </div>

  <div class="login-card">

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Member ID</label>
      <input type="text" name="member_id" class="form-control" placeholder="FCCI-2026-000001" required>

      <label>Birthday (your password)</label>
      <input type="date" name="birthday" class="form-control" required>

      <button type="submit" class="btn-login">Log In</button>
    </form>

  </div>

  <div class="admin-link">
    <a href="/login">Staff/Admin Login →</a>
  </div>
</div>


<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/static/sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
