<!DOCTYPE html>

<html>

<head>

<title>Registration Approval</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid">

<div class="row">

<div class="col-md-2 bg-primary text-white min-vh-100 p-3">

<h3 class="text-center">
FCCI
</h3>

<hr>

<a class="btn btn-light w-100 mb-2"
href="/dashboard">
Dashboard </a>

</div>

<div class="col-md-10 p-4">

<h2>
📝 Registration Approval
</h2>

<div class="card shadow">

<div class="card-body">

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>Photo</th>
<th>Applicant ID</th>
<th>Name</th>
<th>Contact</th>
<th>Email</th>
<th>Date Registered</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for a in applicants %}

<tr>

<td>

{% if a[11] %}

<img
src="{{ url_for('static', filename='uploads/' + a[11]) }}"
width="80"
height="80"
style="object-fit:cover;border-radius:8px;">

{% endif %}

</td>

<td>{{ a[1] }}</td>

<td>{{ a[2] }}</td>

<td>{{ a[3] }}</td>

<td>{{ a[7] }}</td>

<td>{{ a[9] }}</td>

<td>

<a
href="/approve_applicant/{{ a[1] }}"
class="btn btn-success btn-sm">

Approve

</a>

<a
href="/reject_applicant/{{ a[1] }}"
class="btn btn-danger btn-sm">

Reject

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
