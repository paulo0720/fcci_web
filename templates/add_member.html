<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Member</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
  --bg-base: #f4fbf7; --bg-mist: #e9f7ef;
  --glass: rgba(255,255,255,0.7); --glass-border: rgba(0,150,90,0.18);
  --emerald: #00a85c; --emerald-bright: #00c46a; --emerald-deep: #00562a;
  --text-main: #0c2418; --text-dim: #5c8270;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Inter', sans-serif;
  background:
    radial-gradient(circle at 12% 8%, rgba(0,196,106,0.16) 0%, transparent 40%),
    radial-gradient(circle at 88% 18%, rgba(0,168,92,0.12) 0%, transparent 45%),
    linear-gradient(160deg, #ffffff 0%, var(--bg-base) 45%, var(--bg-mist) 100%);
  background-attachment:fixed;
  color:var(--text-main);
  min-height:100vh;
}
.sidebar {
  width:250px; height:100vh; position:fixed; top:0; left:0;
  background:rgba(255,255,255,0.55); backdrop-filter:blur(22px);
  border-right:1px solid var(--glass-border);
  display:flex; flex-direction:column; z-index:10;
  box-shadow:4px 0 24px rgba(0,100,60,0.06);
  overflow-y:auto;
}
.sidebar-brand { padding:28px 20px 22px; border-bottom:1px solid var(--glass-border); text-align:center; }
.brand-logo-ring {
  width:68px; height:68px; border-radius:50%; margin:0 auto 12px; position:relative;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle, rgba(0,196,106,0.18), transparent 70%);
}
.brand-logo-ring::before {
  content:''; position:absolute; inset:0; border-radius:50%;
  border:1px solid var(--emerald); opacity:0.55;
  animation:pulse-ring 2.8s ease-out infinite;
}
@keyframes pulse-ring {
  0% { transform:scale(0.85); opacity:0.7; }
  70% { transform:scale(1.25); opacity:0; }
  100% { transform:scale(1.25); opacity:0; }
}
.brand-logo-ring img { width:48px; height:48px; object-fit:contain; border-radius:50%; position:relative; z-index:1; box-shadow:0 2px 12px rgba(0,100,60,0.15); }
.brand-name {
  font-family:'Space Grotesk', sans-serif; font-size:22px; font-weight:700; letter-spacing:3px;
  background:linear-gradient(90deg, var(--emerald-deep), var(--emerald-bright));
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
}
.brand-sub { font-size:9px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; margin-top:4px; }
.sidebar-nav { padding:18px 12px; }
.sidebar-nav a, .sidebar-footer a {
  display:flex; align-items:center; gap:11px; padding:11px 14px; margin-bottom:3px;
  border-radius:10px; color:var(--text-dim); text-decoration:none;
  font-size:13.5px; font-weight:500; border:1px solid transparent; transition:all 0.25s ease;
}
.sidebar-nav a:hover, .sidebar-nav a.active { background:rgba(0,196,106,0.1); color:var(--emerald-deep); }
.sidebar-footer { padding:16px 12px; border-top:1px solid var(--glass-border); }
.main-content { margin-left:250px; padding:32px 36px; position:relative; z-index:1; }
.topbar h4 { font-family:'Space Grotesk', sans-serif; font-size:24px; font-weight:600; margin-bottom:22px; }
.glass-card {
  background:var(--glass); backdrop-filter:blur(18px); border:1px solid var(--glass-border);
  border-radius:18px; padding:22px; box-shadow:0 4px 20px rgba(0,100,60,0.06); margin-bottom:20px;
}
label { display:block; font-size:12px; font-weight:600; color:var(--emerald-deep); letter-spacing:0.4px; text-transform:uppercase; margin-bottom:6px; }
.form-control { background:rgba(255,255,255,0.8); border:1px solid var(--glass-border); border-radius:12px; padding:11px 16px; font-size:14px; color:var(--text-main); width:100%; }
.form-control:focus { outline:none; border-color:var(--emerald); box-shadow:0 0 0 3px rgba(0,196,106,0.15); }
.form-control::placeholder { color:#9bb8a8; }
.btn-go { background:linear-gradient(135deg, var(--emerald-deep), var(--emerald)); color:#fff; border:none; border-radius:12px; padding:11px 24px; font-weight:600; font-size:14px; box-shadow:0 6px 18px rgba(0,168,92,0.3); text-decoration:none; display:inline-block; cursor:pointer; }
.btn-go:hover { color:#fff; }
table { width:100%; border-collapse:collapse; }
th { font-size:10.5px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.6px; text-align:left; padding-bottom:10px; border-bottom:1px solid var(--glass-border); }
td { font-size:13.5px; color:var(--text-main); padding:11px 6px; border-bottom:1px solid rgba(0,100,60,0.06); }
.badge-pill { font-size:11px; font-weight:700; padding:4px 12px; border-radius:20px; }
.badge-active { background:rgba(0,196,106,0.14); color:var(--emerald-deep); }
.badge-danger { background:rgba(220,53,69,0.12); color:#c0392b; }
.btn-action { padding:5px 12px; border-radius:8px; font-size:12px; font-weight:600; border:none; text-decoration:none; display:inline-block; margin:2px; }
.btn-view { background:rgba(0,150,200,0.12); color:#0077b0; }
.btn-edit { background:rgba(255,170,0,0.14); color:#c97300; }
.btn-delete { background:rgba(220,53,69,0.12); color:#c0392b; }


</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-logo-ring"><img src="{{ url_for('static', filename='fcci_logo.jpeg') }}" alt="FCCI"></div>
    <div class="brand-name">FCCI</div>
    <div class="brand-sub">United in Faith</div>
  </div>
  <nav class="sidebar-nav">
    <a href="/dashboard"><span class="nav-icon">⬡</span> Dashboard</a>
    <a href="/admin_feed"><span class="nav-icon">📰</span> Community Feed</a>
    <a href="/members" class="active"><span class="nav-icon">◈</span> Members</a>
    <a href="/registration_approval"><span class="nav-icon">◉</span> Reg. Approval</a>
    <a href="/payments"><span class="nav-icon">◎</span> Payments</a>
    <a href="/expenses"><span class="nav-icon">◐</span> Expenses</a>
    <a href="/donations"><span class="nav-icon">◭</span> Donations</a>
    <a href="/withdrawals"><span class="nav-icon">▣</span> Withdrawals</a>
    <a href="/attendance"><span class="nav-icon">▤</span> Attendance</a>
    <a href="/exports"><span class="nav-icon">▥</span> Export Center</a>

  </nav>
  <div class="sidebar-footer">
    <a href="/settings"><span class="nav-icon">⚙</span> Settings</a>
    <a href="/logout"><span class="nav-icon">⏻</span> Logout</a>
  </div>
</div>

<div class="main-content">

  <div class="topbar"><h4>➕ Add Member</h4></div>
  <div class="glass-card" style="max-width:560px;">
    <form method="POST" enctype="multipart/form-data">
      <div class="mb-3">
        <label>Full Name</label>
        <input class="form-control" name="full_name" placeholder="Juan Dela Cruz">
      </div>
      <div class="mb-3">
        <label>Contact</label>
        <input class="form-control" name="contact" placeholder="09171234567">
      </div>
      <div class="mb-3">
        <label>Birthday</label>
        <input class="form-control" name="birthday" type="date">
      </div>
      <div class="mb-3">
        <label>Email</label>
        <input class="form-control" name="email" placeholder="juan@email.com">
      </div>
      <div class="mb-3">
        <label>Address</label>
        <textarea class="form-control" name="address" placeholder="123 Mabini St., Quezon City"></textarea>
      </div>
      <div class="mb-3">
        <label>Member Since — Buwan ng Pagpasok sa FCCI</label>
        <select name="member_since" class="form-control" required>
          <option value="">-- Piliin ang Buwan --</option>
          <option value="January 2026">January 2026</option>
          <option value="February 2026">February 2026</option>
          <option value="March 2026">March 2026</option>
          <option value="April 2026">April 2026</option>
          <option value="May 2026">May 2026</option>
          <option value="June 2026">June 2026</option>
          <option value="July 2026">July 2026</option>
          <option value="August 2026">August 2026</option>
          <option value="September 2026">September 2026</option>
          <option value="October 2026">October 2026</option>
          <option value="November 2026">November 2026</option>
          <option value="December 2026">December 2026</option>
        </select>
      </div>
      <div class="mb-3">
        <label>Photo</label>
        <input type="file" name="photo" class="form-control">
      </div>
      <button class="btn-go">Save Member</button>
    </form>
  </div>

</div>

</body>
</html>
