<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naka-register ka na! — FCCI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base:#f4fbf7; --bg-mist:#e9f7ef;
    --glass:rgba(255,255,255,0.75); --glass-border:rgba(0,150,90,0.18);
    --emerald:#00a85c; --emerald-bright:#00c46a; --emerald-deep:#00562a;
    --text-main:#0c2418; --text-dim:#5c8270;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Inter', sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 12% 8%, rgba(0,196,106,0.16) 0%, transparent 40%),
      radial-gradient(circle at 88% 18%, rgba(0,168,92,0.12) 0%, transparent 45%),
      linear-gradient(160deg, #ffffff 0%, var(--bg-base) 45%, var(--bg-mist) 100%);
    color:var(--text-main); padding:20px;
  }
  .card {
    background:var(--glass); backdrop-filter:blur(20px); border:1px solid var(--glass-border);
    border-radius:22px; padding:36px 30px; max-width:400px; width:100%; text-align:center;
    box-shadow:0 8px 30px rgba(0,150,90,0.1);
  }
  .check {
    width:64px; height:64px; border-radius:50%; margin:0 auto 18px;
    background:linear-gradient(135deg, var(--emerald-deep), var(--emerald-bright));
    display:flex; align-items:center; justify-content:center; font-size:30px; color:#fff;
  }
  h2 { font-family:'Space Grotesk', sans-serif; color:var(--emerald-deep); margin-bottom:8px; }
  p { font-size:13.5px; color:var(--text-dim); line-height:1.6; margin-bottom:6px; }
  .info-box {
    background:rgba(0,168,92,0.08); border:1px solid rgba(0,168,92,0.25); border-radius:12px;
    padding:12px 14px; margin:16px 0; font-size:13px; color:var(--emerald-deep); text-align:left;
  }
  .btn-back {
    display:inline-block; margin-top:14px; background:linear-gradient(135deg, var(--emerald-deep), var(--emerald));
    color:#fff; text-decoration:none; padding:11px 26px; border-radius:12px; font-weight:600; font-size:13.5px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h2>Naka-register ka na!</h2>
    <p>Salamat sa pag-sign up. Ipinaabot na namin ito sa FCCI admin.</p>
    <div class="info-box">
      <div><b>{{ team_name if team_name else 'Registration' }}</b></div>
      <div>Registered by: {{ captain_name }}</div>
    </div>
    <p>Tatawagan ka namin sa contact number na inilagay mo kung may karagdagang detalye.</p>
    <a href="/member_login" class="btn-back">← Bumalik sa Login Page</a>
  </div>
</body>
</html>
