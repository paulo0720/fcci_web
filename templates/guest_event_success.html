<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naka-register ka na! — FCCI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan:#00d4c8; --cyan-deep:#00a89e; --violet:#7c6df0;
    --ink:#0b1d2e; --muted:#6b7e8f;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Outfit', sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(ellipse 700px 500px at 12% 8%, rgba(0,212,200,0.16) 0%, transparent 45%),
      radial-gradient(ellipse 600px 500px at 88% 90%, rgba(124,109,240,0.12) 0%, transparent 50%),
      linear-gradient(160deg, #ffffff 0%, #f4f8fb 100%);
    color:var(--ink); padding:20px;
  }
  .card {
    background:rgba(255,255,255,0.8); backdrop-filter:blur(20px); border:1px solid rgba(0,212,200,0.2);
    border-radius:24px; padding:40px 32px; max-width:410px; width:100%; text-align:center;
    box-shadow:0 20px 60px rgba(0,60,80,0.12);
  }
  .check {
    width:76px; height:76px; border-radius:50%; margin:0 auto 20px;
    background:linear-gradient(135deg, var(--cyan), var(--violet));
    display:flex; align-items:center; justify-content:center; font-size:34px; color:#fff;
    box-shadow:0 8px 30px rgba(0,212,200,0.4); animation:pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop { from { transform:scale(0); } to { transform:scale(1); } }
  h2 { font-size:23px; font-weight:800; color:var(--ink); margin-bottom:8px; }
  p { font-size:13.5px; color:var(--muted); line-height:1.6; margin-bottom:6px; }
  .info-box {
    background:rgba(0,212,200,0.08); border:1px solid rgba(0,212,200,0.3); border-radius:14px;
    padding:14px 16px; margin:18px 0; font-size:13px; color:var(--cyan-deep); text-align:left;
  }
  .info-box b { color:var(--ink); }
  .btn-back {
    display:inline-block; margin-top:16px; background:linear-gradient(135deg, var(--cyan-deep), var(--cyan));
    color:#04222a; text-decoration:none; padding:13px 28px; border-radius:13px; font-weight:700; font-size:14px;
    box-shadow:0 8px 24px rgba(0,212,200,0.3);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h2>Naka-register ka na!</h2>
    <p>Salamat sa pag-sign up. Ipinaabot na namin ito sa FCCI admin.</p>
    <div class="info-box">
      <div><b>{{ team_name if team_name else 'Registration' }}</b></div>
      <div>Registered by: {{ captain_name }}</div>
    </div>
    <p>Tatawagan ka namin sa contact number na inilagay mo kung may karagdagang detalye.</p>
    <a href="/member_login" class="btn-back">← Bumalik sa Login Page</a>
  </div>
</body>
</html>
