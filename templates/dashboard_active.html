<!DOCTYPE html>

<html>

<head>

<title>Active Members</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid">

<div class="row">

<div class="col-md-2 bg-primary text-white min-vh-100 p-3">

<h3 class="text-center">
FCCI
</h3>

<hr>

<a class="btn btn-light w-100 mb-2"
href="/dashboard">
🏠 Dashboard </a>

</div>

<div class="col-md-10 p-4">

<h2>
🟢 Active Members
</h2>

<div class="card shadow">

<div class="card-body">

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>Member ID</th>
<th>Full Name</th>
<th>Contact</th>
<th>Status</th>

</tr>

</thead>

<tbody>

{% for member in members %}

<tr>

<td>
{{ member[0] }}
</td>

<td>
{{ member[1] }}
</td>

<td>
{{ member[2] }}
</td>

<td>
<span class="badge bg-success">
ACTIVE
</span>
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
