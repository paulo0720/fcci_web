<!DOCTYPE html>

<html>

<head>

<title>Outstanding Members</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid">

<div class="row">

<div class="col-md-2 bg-primary text-white min-vh-100 p-3">

<h3 class="text-center">
FCCI
</h3>

<hr>

<a class="btn btn-light w-100 mb-2"
href="/dashboard">
🏠 Dashboard </a>

</div>

<div class="col-md-10 p-4">

<h2>
⚠️ Outstanding Members
</h2>

<div class="card shadow">

<div class="card-body">

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>Member ID</th>
<th>Name</th>
<th>Outstanding Balance</th>
<th>Unpaid Months</th>

</tr>

</thead>

<tbody>

{% for row in data %}

<tr>

<td>
{{ row.member_id }}
</td>

<td>
{{ row.full_name }}
</td>

<td>
<b class="text-danger">
₩{{ "{:,}".format(row.amount) }}
</b>
</td>

<td>

{% for month in row.months %}

<span class="badge bg-danger m-1">

{{ month }}

</span>

{% endfor %}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
