<!DOCTYPE html>

<html>

<head>

<title>Applicants</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid">

<div class="row">

<div class="col-md-2 bg-primary text-white min-vh-100 p-3">

<h3 class="text-center">
FCCI
</h3>

<hr>

<a class="btn btn-light w-100 mb-2"
href="/dashboard">
🏠 Dashboard </a>

</div>

<div class="col-md-10 p-4">

<h2>
📝 Applicants
</h2>

<div class="card shadow">

<div class="card-body">

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>Member ID</th>
<th>Full Name</th>
<th>Contact</th>
<th>Date Registered</th>
<th>Days Pending</th>

</tr>

</thead>

<tbody>

{% for applicant in applicants %}

<tr>

<td>{{ applicant[0] }}</td>

<td>{{ applicant[1] }}</td>

<td>{{ applicant[2] }}</td>

<td>{{ applicant[3] }}</td>

<td>
Pending Registration Fee
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
