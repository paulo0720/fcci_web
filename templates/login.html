<!DOCTYPE html>
<html>
<head>
    <title>FCCI Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;

            background:
            linear-gradient(
                rgba(255,255,255,0.85),
                rgba(255,255,255,0.85)
            ),
            url('{{ url_for("static", filename="background.jpg") }}');

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:Arial, Helvetica, sans-serif;
        }

        .login-card{

            width:450px;

            background:white;

            border-radius:25px;

            padding:40px;

            box-shadow:
            0 10px 40px rgba(0,0,0,.15);

            text-align:center;
        }

        .logo{

            width:130px;
            height:130px;

            object-fit:contain;

            margin-bottom:10px;
        }

        .title{

            font-size:48px;
            font-weight:bold;

            color:#006b2d;
        }

        .subtitle{

            font-size:20px;

            margin-bottom:20px;
        }

        .form-control{

            height:55px;

            border-radius:12px;
        }

        .btn-login{

            background:#007a33;

            color:white;

            width:100%;

            height:55px;

            border:none;

            border-radius:12px;

            font-size:20px;

            font-weight:bold;

            margin-top:10px;
        }

        .btn-login:hover{

            background:#005f28;
        }

        .register-link{

            margin-top:20px;
        }

        .register-link a{

            text-decoration:none;

            font-weight:bold;
        }

        .btn-member-login{

            display:block;

            width:100%;

            height:55px;

            line-height:55px;

            margin-top:10px;

            background:#ffffff;

            color:#007a33;

            border:2px solid #007a33;

            border-radius:12px;

            font-size:18px;

            font-weight:bold;

            text-decoration:none;
        }

.btn-member-login:hover{

    background:#007a33;

    color:white;
}

    </style>


  <!-- PWA -->
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#0b2236">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FCCI">
  <link rel="apple-touch-icon" href="/static/fcci_logo.jpeg">

  <link rel="stylesheet" href="/static/fcci_hud_theme.css">
</head>

<body>
<div class="ambient-orb o1"></div>
<div class="ambient-orb o2"></div>

<div class="login-card">

    <img
    src="{{ url_for('static', filename='fcci_logo.jpeg') }}"
    class="logo">

    <div class="title">
        FCCI
    </div>

    <div class="subtitle">
        Filipino Community Center International
    </div>

    <hr>

    <form method="POST">

        <div class="mb-3">

            <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Username"
            required>

        </div>

        <div class="mb-3">

            <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Password"
            required>

        </div>

        <button
        type="submit"
        class="btn-login">

            LOGIN

        </button>

    </form>

    <div class="register-link">

        <a href="/member_registration">
            New Member Registration
        </a>

        <a href="/member_login" class="btn-member-login">
            MEMBER LOGIN
        </a>

    </div>

</div>


<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/static/sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
