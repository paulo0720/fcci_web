<!DOCTYPE html>

<html>

<head>

<title>FCCI Payments</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid">

<div class="row">

<div class="col-md-2 bg-primary text-white min-vh-100 p-3">

<h3 class="text-center">
FCCI
</h3>

<hr>

<a class="btn btn-light w-100 mb-2"
href="/dashboard">
Dashboard </a>

<a class="btn btn-success w-100 mb-2"
href="/members">
Members </a>

<a class="btn btn-warning w-100 mb-2"
href="/payments">
Payments </a>

<a class="btn btn-danger w-100"
href="/logout">
Logout </a>

</div>

<div class="col-md-10 p-4">

<h2>
💰 Payment Management
</h2>

<div class="card shadow mb-4">

<div class="card-body">

<form method="POST">

<div class="row">

<div class="col-md-4">

<label>
Member ID
</label>

<input
type="text"
name="member_id"
class="form-control"
placeholder="FCCI-2026-000001"
required>
</div>

<div class="col-md-4">

<label>
Payment Type
</label>

<select
name="payment_type"
class="form-select"
required>

<option value="Registration Fee">
Registration Fee
</option>

<option value="Monthly Contribution">
Monthly Contribution
</option>

</select>

</div>


</div>

<br>

<div class="row">

<div class="col-md-4">

<label>
Month
</label>

<select
name="payment_month"
class="form-select">

<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>

</select>

</div>

<div class="col-md-4">

<label>
Year
</label>

<select
name="payment_year"
class="form-select">

<option>2025</option>
<option>2026</option>
<option>2027</option>
<option>2028</option>
<option>2029</option>
<option>2030</option>

</select>

</div>


</div>

<br>

<button
class="btn btn-success">
Save Payment </button>

</form>

</div>

</div>

<div class="card shadow">

<div class="card-body">

<h4>
Payment History
</h4>

<table class="table table-striped">

<thead>

<tr>

<th>Receipt No</th>
<th>Member ID</th>
<th>Type</th>
<th>Amount</th>
<th>Date</th>

</tr>

</thead>

<tbody>

{% for p in payment_history %}

<tr>

<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>₩{{ p[3] }}</td>
<td>{{ p[4] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
