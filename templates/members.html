<!DOCTYPE html>
<html>

<head>

<title>FCCI Members</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid">

<div class="row">

<div class="col-md-2 bg-primary text-white min-vh-100 p-3">

<script src="https://unpkg.com/html5-qrcode"></script>

<button
class="btn btn-primary mb-3"
onclick="startScanner()">

📷 Scan Member QR

</button>

<div id="reader"
style="width:400px;display:none;">
</div>

<h3 class="text-center">
FCCI
</h3>

<hr>

<a class="btn btn-light w-100 mb-2"
href="/dashboard">
Dashboard
</a>

<a class="btn btn-success w-100 mb-2"
href="/add_member">
➕ Add Member
</a>

<a class="btn btn-danger w-100"
href="/logout">
Logout
</a>

</div>

<div class="col-md-10 p-4">

<h2>
👥 Member Management
</h2>

<form method="GET">

<div class="row mb-3">

<div class="col-md-6">

<input
type="text"
name="search"
class="form-control"
placeholder="Search Member"
value="{{ search }}"
>

</div>

<div class="col-md-2">

<button
class="btn btn-primary w-100">
Search
</button>

</div>

</div>

</form>

<div class="card shadow">

<div class="card-body">

<table class="table table-striped">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Contact</th>
<th>Email</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for m in members %}

<tr>

<td>{{ m[0] }}</td>
<td>{{ m[1] }}</td>
<td>{{ m[2] }}</td>
<td>{{ m[3] }}</td>
<td>{{ m[4] }}</td>

<td>

<a href="/view_member/{{ m[0] }}"
class="btn btn-info btn-sm">
View
</a>

<a
href="/member_profile/{{ m[0] }}"
class="btn btn-primary btn-sm">

Profile

</a>

<a
href="/member_id_card/{{ m[0] }}"
class="btn btn-info btn-sm">

ID

</a>


<a href="/edit_member/{{ m[0] }}"
class="btn btn-warning btn-sm">
Edit
</a>

<a
href="/delete_member/{{ m[0] }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this member permanently? This action cannot be undone.')">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

<script>

function startScanner()
{

    document
    .getElementById("reader")
    .style.display = "block";

    let scanner =
    new Html5QrcodeScanner(
        "reader",
        {
            fps:10,
            qrbox:250
        }
    );

    scanner.render(
        function(decodedText)
        {
            window.location =
            "/member_profile/" +
            decodedText;
        }
    );
}

</script>

</div>

</body>

</html>
