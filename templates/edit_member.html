<!DOCTYPE html>
<html>

<head>

<title>Edit Member</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="container mt-4">

<h2>Edit Member</h2>

<form method="POST" enctype="multipart/form-data">

<input
class="form-control mb-2"
name="full_name"
value="{{ member[2] }}">

<input
class="form-control mb-2"
name="contact"
value="{{ member[3] }}">

<input
type="date"
class="form-control mb-2"
name="birthday"
value="{{ member[4] }}">

<input
class="form-control mb-2"
name="email"
value="{{ member[5] }}">

<textarea
class="form-control mb-2"
name="address">{{ member[6] }}</textarea>


<label class="form-label">
Current Photo
</label>



<hr>

{% if member[11] %}

<img
src="/static/uploads/{{ member[11] }}"
width="150"
class="img-thumbnail mb-3">

{% endif %}

<input
type="file"
name="photo"
class="form-control mb-3">

<button
class="btn btn-success">
Update Member
</button>

<a
href="/members"
class="btn btn-secondary">
Cancel
</a>

</form>

</body>

</html>
